<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab1: 猜歌遊戲 🎵</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="../index.html" class="back-link">← 回到首頁</a>

    <!-- Background Decorative Icons -->
    <div class="bg-icon icon-1">🌸</div>
    <div class="bg-icon icon-2">✨</div>
    <div class="bg-icon icon-3">🍬</div>
    <div class="bg-icon icon-4">🌈</div>

    <div class="container">
        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <div class="mascot">🐰</div>
            <h1>猜歌大挑戰！</h1>
            <p>聽一段旋律，選出正確的歌名吧！<br>看看你是不是音樂小神童 ✨</p>
            <button class="btn-main" onclick="game.start()">開始遊戲 GO!</button>
        </div>

        <!-- Question Screen -->
        <div id="question-screen" class="screen">
            <div class="status-bar">
                <span id="question-number">第 1 / 5 題</span>
                <div class="score-badge">得分: <span id="current-score">0</span></div>
            </div>
            
            <div class="progress-container">
                <div id="progress-fill"></div>
            </div>

            <div class="disc-container">
                <div class="disc" id="disc"></div>
                <!-- Vinyl Tonearm -->
                <div class="tonearm-base"></div>
                <div class="tonearm" id="tonearm">
                    <div class="tonearm-arm"></div>
                    <div class="tonearm-head"></div>
                </div>
            </div>

            <!-- Music Seek Bar -->
            <div class="seek-container">
                <input type="range" id="seek-bar" value="0" step="0.1">
                <div class="time-info">
                    <span id="current-time">0:00</span>
                    <span id="total-time">0:00</span>
                </div>
            </div>

            <div class="options-grid" id="options-container">
                <!-- Buttons will be injected here -->
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen">
            <h1>挑戰完成！</h1>
            <h2 id="result-message">好棒！繼續加油！</h2>
            <div class="final-score-container">
                <span class="final-score" id="final-score">0</span>
                <p>分</p>
            </div>
            <button class="btn-main" onclick="game.start()">再玩一次</button>
        </div>
    </div>

    <!-- Hidden Audio Player -->
    <audio id="audio-player"></audio>

    <script src="game.js"></script>
</body>
</html>
