<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab3: 動態星空畫布</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="overlay">
        <div class="title-area">
            <h1>星空畫布 🌌</h1>
            <p>移動滑鼠，繪製屬於你的動態星空 (已初步實作，可繼續擴充)</p>
        </div>
        <a href="../index.html" class="back-link">← 回到首頁</a>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];

        canvas.addEventListener('mousemove', (e) => {
            for (let i = 0; i < 3; i++) {
                particles.push({
                    x: e.x,
                    y: e.y,
                    size: Math.random() * 5 + 1,
                    speedX: Math.random() * 4 - 2,
                    speedY: Math.random() * 4 - 2,
                    color: `hsl(${Math.random() * 40 + 30}, 50%, 75%)`, // 橘色與黃色系
                    life: 100
                });
            }
        });

        // 加入觸控支持給手機
        canvas.addEventListener('touchmove', (e) => {
            let touch = e.touches[0];
            for (let i = 0; i < 3; i++) {
                particles.push({
                    x: touch.clientX,
                    y: touch.clientY,
                    size: Math.random() * 5 + 1,
                    speedX: Math.random() * 4 - 2,
                    speedY: Math.random() * 4 - 2,
                    color: `hsl(${Math.random() * 40 + 30}, 50%, 75%)`,
                    life: 100
                });
            }
        });

        function animate() {
            // 造成拖影效果
            ctx.fillStyle = 'rgba(252, 251, 248, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0; // 重置shadow
                
                p.x += p.speedX;
                p.y += p.speedY;
                p.life -= 1.5;
                p.size *= 0.95;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
