<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab3: 小遊戲集 🎮</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Game Over Modal (Moved to top for best clickability) -->
    <div id="game-over" class="modal" style="display: none;">
        <div class="modal-content">
            <h2 id="modal-title">時間到！⏰</h2>
            <p id="modal-msg">你的最終分數是</p>
            <div class="final-score" id="final-score-val">0</div>
            <button id="modal-restart-btn" class="restart-btn" onclick="handleRestart()">再試一次</button>
            <button id="modal-lobby-btn" class="restart-btn secondary" onclick="handleGoLobby()">回選單</button>
        </div>
    </div>

    <div class="game-container">
        <!-- Time's Up Overlay -->
        <div id="times-up-overlay" class="times-up-overlay">時間到！⏰</div>

        <!-- Lobby / Menu -->
        <div id="lobby" class="view active">
            <header class="lobby-header">
                <h1>選哪個ㄌㄟ👀❓</h1>
                <p>選擇一個你想挑戰的遊戲吧！</p>
            </header>
            <div class="game-menu">
                <button class="menu-card" data-game="mole">
                    <span class="emoji">🐭</span>
                    <div class="info">
                        <h3>打地鼠</h3>
                        <p>考驗反應速度</p>
                    </div>
                </button>
                <button class="menu-card" data-game="basketball">
                    <span class="emoji">🏀</span>
                    <div class="info">
                        <h3>雞哥投籃</h3>
                        <p>真香！看準時機投球</p>
                    </div>
                </button>
                <a href="../lab4/index.html" class="menu-card" style="text-decoration: none; color: inherit;">
                    <span class="emoji">🐥</span>
                    <div class="info">
                        <h3>請遵守交通
                        </h3>
                        <p>全螢幕立體大挑戰！✨</p>
                    </div>
                </a>
            </div>
            <a href="../index.html" class="back-link-main">← 回到首頁</a>
        </div>

        <!-- Whack-a-Mole View -->
        <div id="mole-game" class="view">
            <header class="game-header">
                <button class="btn-lobby-back">← 選單</button>
                <div class="stat-card">
                    <span class="label">分數</span>
                    <span id="mole-score" class="value">0</span>
                </div>
                <div class="timer-card">
                    <div id="mole-timer-bar" class="timer-bar"></div>
                    <span id="mole-time-left" class="value">15</span>
                    <span class="label">秒</span>
                </div>
            </header>
            <main class="game-body mole-3d-container" id="mole-3d-container">
                <!-- 3D Canvas will be injected here -->
            </main>
            <footer class="game-footer">
                <button id="mole-start-btn" class="start-btn">開始/重新開始</button>
            </footer>
        </div>

        <!-- Basketball Game View (Replaced Memory Match) -->
        <div id="basketball-game" class="view">
            <header class="game-header">
                <button class="btn-lobby-back">← 選單</button>
                <div class="stat-card">
                    <span class="label">進球數</span>
                    <span id="basket-score" class="value">0</span>
                </div>
                <div class="timer-card">
                    <div id="basket-timer-bar" class="timer-bar"></div>
                    <span id="basket-time-left" class="value">15</span>
                    <span class="label">秒</span>
                </div>
            </header>
            <main class="game-body basket-container" id="basket-3d-container">
                <!-- 3D Basketball Arena will be injected here -->
                <div id="basket-hint" class="hint">點擊畫面投籃！🏀</div>
            </main>
            <footer class="game-footer">
                <button id="basket-start-btn" class="start-btn">開始挑戰</button>
            </footer>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
