<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 4: 3D 萌萌冒險 🐥</title>
    <style>
        body { margin: 0; overflow: hidden; background: #a8e6cf; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3); pointer-events: none;
        }
        .back-link {
            position: absolute; bottom: 20px; left: 20px;
            background: white; padding: 10px 20px; border-radius: 20px;
            text-decoration: none; color: #ff8b94; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.2s;
        }
        .back-link:hover { transform: scale(1.1); }
        #msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95); padding: 30px; border-radius: 20px;
            text-align: center; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 2000; pointer-events: auto;
        }
        button {
            background: #ff8b94; color: white; border: none; padding: 10px 25px;
            border-radius: 10px; cursor: pointer; font-size: 1.1rem; margin-top: 15px;
            pointer-events: auto;
        }
        .char-btn { padding: 5px 15px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div id="ui">
        <div style="background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 15px;">
            <div style="font-size: 1.2rem; font-weight: bold;">救援次數: <span id="score">0</span></div>
        </div>
        <div style="margin-top:10px;">
            <button class="char-btn" onclick="switchCharacter('chiikawa')">吉伊</button>
            <button class="char-btn" onclick="switchCharacter('hachiware')">小八</button>
            <button class="char-btn" onclick="switchCharacter('usagi')">烏薩奇</button>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,209,220,0.95); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000;">
        <h1 style="color:#ff8b94; font-size:3rem; margin-bottom:10px;">萌萌大冒險 🐥</h1>
        <p style="color:#666; font-size:1.2rem; margin-bottom:30px;">選擇一個勇者出發過馬路吧！</p>
        <div style="display:flex; gap:20px;">
            <div class="char-card" onclick="startGame('chiikawa')" style="background:white; padding:20px; border-radius:20px; cursor:pointer; text-align:center; transition:transform 0.2s;">
                <div style="font-size:3rem;">🐥</div>
                <div style="font-weight:bold; color:#ff8b94;">吉伊</div>
            </div>
            <div class="char-card" onclick="startGame('hachiware')" style="background:white; padding:20px; border-radius:20px; cursor:pointer; text-align:center; transition:transform 0.2s;">
                <div style="font-size:3rem;">🐱</div>
                <div style="font-weight:bold; color:#4fc3f7;">小八</div>
            </div>
            <div class="char-card" onclick="startGame('usagi')" style="background:white; padding:20px; border-radius:20px; cursor:pointer; text-align:center; transition:transform 0.2s;">
                <div style="font-size:3rem;">🐰</div>
                <div style="font-weight:bold; color:#fdd835;">烏薩奇</div>
            </div>
        </div>
        <p style="margin-top:40px; color:#888;">點擊畫面或按空白鍵可以跳躍過馬路喔！</p>
    </div>

    <div id="msg">
        <h2 id="modal-title">哎呀！受傷了... 🥺</h2>
        <button onclick="resetGame()">重新振作！✨</button>
    </div>

    <a href="../lab3/index.html" class="back-link">← 回到小遊戲大廳</a>

    <style>
        .char-card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        #ui { display: none; } /* Hide game UI until started */
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, chiikawa, score = 0;
        let cars = [], lanes = [];
        let gameActive = false; // Start inactive
        let currentType = 'chiikawa'; 
        let isJumping = false; 

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffd1dc); 

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 10);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lighting (Softer)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(10, 20, 10);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.left = -20;
            dirLight.shadow.camera.right = 20;
            dirLight.shadow.camera.top = 20;
            dirLight.shadow.camera.bottom = -20;
            scene.add(dirLight);
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0xffd1dc, 0.3);
            scene.add(hemiLight);

            createPlayer(currentType);
            initEnvironment();

            window.addEventListener('resize', onWindowResize, false);
            window.addEventListener('mousedown', jump);
            window.addEventListener('keydown', (e) => { if(e.code === 'Space') jump(); });

            animate();
        }

        function startGame(type) {
            currentType = type;
            createPlayer(type);
            chiikawa.position.set(0, 0.7, 4); // Force reset to start
            gameActive = true;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function switchCharacter(type) {
            currentType = type;
            createPlayer(type);
        }

        function createPlayer(type) {
            if(!chiikawa) {
                chiikawa = new THREE.Group();
                chiikawa.position.set(0, 0.7, 4);
                scene.add(chiikawa);
            }
            
            // Clear existing parts
            while(chiikawa.children.length > 0){ 
                chiikawa.remove(chiikawa.children[0]); 
            }
            
            const bodyMat = new THREE.MeshLambertMaterial({ color: (type === 'usagi' ? 0xfff9c4 : 0xffffff) });
            
            // Body
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.7, 32, 32), bodyMat);
            body.scale.set(1.1, 1, 0.9);
            body.castShadow = true;
            chiikawa.add(body);

            // Ears & Hachiware Fringe
            if(type === 'usagi') {
                const earGeo = new THREE.CylinderGeometry(0.1, 0.15, 1.2, 16);
                const earL = new THREE.Mesh(earGeo, bodyMat);
                earL.position.set(0.3, 1.0, 0);
                earL.rotation.z = -0.2;
                chiikawa.add(earL);
                const earR = earL.clone(); earR.position.x = -0.3; earR.rotation.z = 0.2;
                chiikawa.add(earR);
            } else {
                const earGeo = new THREE.SphereGeometry(0.2, 16, 16);
                const blueMat = new THREE.MeshLambertMaterial({ color: 0x90caf9 });
                const earLMat = (type === 'hachiware') ? blueMat : bodyMat;
                const earL = new THREE.Mesh(earGeo, earLMat);
                earL.position.set(0.4, 0.5, 0);
                chiikawa.add(earL);
                const earR = earL.clone(); earR.position.x = -0.4;
                chiikawa.add(earR);

                // Add Refined Hachiware "Hair" (Blue with V-notch)
                if(type === 'hachiware') {
                    const hairCanvas = document.createElement('canvas');
                    hairCanvas.width = 512; hairCanvas.height = 512;
                    const hCtx = hairCanvas.getContext('2d');
                    hCtx.fillStyle = '#ffffff'; hCtx.fillRect(0,0,512,512);
                    hCtx.fillStyle = '#79a9c7'; // Muted Blue from image
                    // Draw the blue cap with a sharper V-notch
                    hCtx.beginPath();
                    hCtx.moveTo(0, 0);
                    hCtx.lineTo(512, 0);
                    hCtx.lineTo(512, 160);
                    hCtx.lineTo(340, 160);
                    hCtx.lineTo(256, 110); // Sharper V-notch point
                    hCtx.lineTo(172, 160);
                    hCtx.lineTo(0, 160);
                    hCtx.closePath();
                    hCtx.fill();
                    
                    const hairTex = new THREE.CanvasTexture(hairCanvas);
                    body.material = new THREE.MeshLambertMaterial({ map: hairTex });
                    body.rotation.y = Math.PI; // Rotate to face the notch forward
                    
                    // Update ears to match the new blue
                    earLMat.color.set(0x79a9c7);
                }
            }

            // Eyes
            const eyeGeo = new THREE.SphereGeometry(0.12, 16, 16);
            const eyeMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(0.25, 0.1, 0.55);
            chiikawa.add(eyeL);
            const eyeR = eyeL.clone(); eyeR.position.x = -0.25;
            chiikawa.add(eyeR);

            // Eye Sparkle
            const sparkleGeo = new THREE.SphereGeometry(0.04, 8, 8);
            const sparkleMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const sL = new THREE.Mesh(sparkleGeo, sparkleMat);
            sL.position.set(0.28, 0.15, 0.65);
            chiikawa.add(sL);
            const sR = sL.clone(); sR.position.x = -0.22;
            chiikawa.add(sR);

            // Cheeks (Pink)
            const cheekGeo = new THREE.SphereGeometry(0.15, 16, 16);
            const cheekMat = new THREE.MeshLambertMaterial({ color: 0xffb7c5 });
            const cheekL = new THREE.Mesh(cheekGeo, cheekMat);
            cheekL.position.set(0.5, -0.1, 0.45);
            cheekL.scale.set(1, 0.6, 1);
            chiikawa.add(cheekL);
            const cheekR = cheekL.clone(); cheekR.position.x = -0.5;
            chiikawa.add(cheekR);
        }

        function initEnvironment() {

            // Create Stone Brick Texture (Procedural)
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#d3d3d3'; ctx.fillRect(0,0,256,256);
            ctx.strokeStyle = '#bcbcbc'; ctx.lineWidth = 4;
            // Draw brick pattern
            for(let i=0; i<8; i++) {
                for(let j=0; j<8; j++) {
                    const xOff = (i % 2 === 0) ? 0 : 16;
                    ctx.strokeRect(j*32 + xOff, i*32, 32, 32);
                }
            }
            const groundTex = new THREE.CanvasTexture(canvas);
            groundTex.wrapS = THREE.RepeatWrapping;
            groundTex.wrapT = THREE.RepeatWrapping;
            groundTex.repeat.set(10, 20);

            // Create Ground (Stone Brick Floor)
            const groundGeo = new THREE.PlaneGeometry(30, 80);
            const groundMat = new THREE.MeshLambertMaterial({ map: groundTex }); 
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2; 
            ground.receiveShadow = true; 
            ground.position.z = -10; 
            scene.add(ground);

            // Start Line (Soft White)
            const startGeo = new THREE.PlaneGeometry(20, 4);
            const startMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
            const start = new THREE.Mesh(startGeo, startMat);
            start.rotation.x = -Math.PI / 2;
            start.position.y = 0.01;
            start.position.z = 4;
            start.receiveShadow = true;
            scene.add(start);

            // Finish Line (Exactly at the end of the road!)
            const finish = start.clone();
            finish.position.z = -16;
            scene.add(finish);

            // Add Hedges to block out-of-bounds view
            const hedgeGeo = new THREE.BoxGeometry(2, 2, 80); // Longer hedges
            const hedgeMat = new THREE.MeshLambertMaterial({ color: 0x2e7d32 });
            const hedgeL = new THREE.Mesh(hedgeGeo, hedgeMat);
            hedgeL.position.set(-11, 1, -10);
            hedgeL.castShadow = true; hedgeL.receiveShadow = true;
            scene.add(hedgeL);
            const hedgeR = hedgeL.clone(); hedgeR.position.x = 11;
            scene.add(hedgeR);

            // Add Trees for decoration
            createTree(-8, 6);
            createTree(8, 6);
            createTree(-8, -22); 
            createTree(8, -22);
            createTree(-5, -28); // Extra trees in the distance
            createTree(5, -28);

            // Entire Road (Grey Asphalt)
            const roadGeo = new THREE.PlaneGeometry(20, 20);
            const roadMat = new THREE.MeshLambertMaterial({ color: 0x444444 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.position.set(0, 0.05, -6); 
            road.receiveShadow = true;
            scene.add(road);

            // Zebra Crossing (Normal Centered Style)
            for(let s=0; s<9; s++) {
                const stripe = new THREE.Mesh(new THREE.PlaneGeometry(6, 0.8), new THREE.MeshLambertMaterial({ color: 0xffffff }));
                stripe.rotation.x = -Math.PI / 2;
                stripe.position.set(0, 0.08, 2 - (s * 2.2)); 
                scene.add(stripe);
            }
            
            createTrafficLight(-3, 4);
            createTrafficLight(3, -14);
        }

        function createTree(x, z) {
            const treeGroup = new THREE.Group();
            // Trunk
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 1.5, 8), new THREE.MeshLambertMaterial({ color: 0x8b4513 }));
            trunk.position.y = 0.75;
            trunk.castShadow = true;
            treeGroup.add(trunk);
            // Foliage (3 spheres for a cute look)
            const foliageMat = new THREE.MeshLambertMaterial({ color: 0x4caf50 });
            for(let i=0; i<3; i++) {
                const foliage = new THREE.Mesh(new THREE.SphereGeometry(0.8 - i*0.2, 16, 16), foliageMat);
                foliage.position.y = 1.5 + i * 0.6;
                foliage.castShadow = true;
                treeGroup.add(foliage);
            }
            treeGroup.position.set(x, 0, z);
            scene.add(treeGroup);
        }

        function createTrafficLight(x, z) {
            const group = new THREE.Group();
            // Pole
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 4, 16), new THREE.MeshLambertMaterial({ color: 0x333333 }));
            pole.position.y = 2; 
            pole.castShadow = true;
            group.add(pole);
            // Box
            const box = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.2, 0.5), new THREE.MeshLambertMaterial({ color: 0x111111 }));
            box.position.y = 3.5; 
            box.castShadow = true;
            group.add(box);
            // Lights (Red, Yellow, Green)
            const colors = [0xff0000, 0xffff00, 0x00ff00];
            colors.forEach((c, i) => {
                const light = new THREE.Mesh(new THREE.CircleGeometry(0.15, 16), new THREE.MeshBasicMaterial({ color: c }));
                light.position.set(0, 3.9 - i * 0.4, 0.26); group.add(light);
            });
            group.position.set(x, 0, z);
            scene.add(group);
        }

        function spawnCar(manualLane, manualDir) {
            if(!gameActive && !manualLane && manualLane !== 0) return; // Only spawn if active OR manual call
            const laneIdx = (manualLane !== undefined) ? manualLane : Math.floor(Math.random() * 4);
            const direction = (manualDir !== undefined) ? manualDir : (laneIdx % 2 === 0 ? 1 : -1);
            const spawnZ = 0 - (laneIdx * 4);
            const spawnX = direction === 1 ? -12 : 12;

            // Check for overlap (No car in same lane within 4 units)
            const overlap = cars.some(car => {
                return car.position.z === spawnZ && Math.abs(car.position.x - spawnX) < 5;
            });
            if(overlap) return;

            const color = new THREE.Color().setHSL(Math.random(), 0.7, 0.6);
            const carGroup = new THREE.Group();
            
            // Chassis (Bottom body)
            const chassis = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.6, 1.4), new THREE.MeshLambertMaterial({ color: color }));
            chassis.position.y = 0.4;
            chassis.castShadow = true;
            carGroup.add(chassis);
            
            // Cabin (Top part)
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 1.2), new THREE.MeshLambertMaterial({ color: color }));
            cabin.position.set(-0.2 * direction, 0.9, 0);
            cabin.castShadow = true;
            carGroup.add(cabin);

            // Windows
            const winMat = new THREE.MeshLambertMaterial({ color: 0xccddff });
            const sideWin = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.3, 1.25), winMat);
            sideWin.position.set(-0.2 * direction, 0.9, 0);
            carGroup.add(sideWin);
            
            // Wheels (4 cylinders)
            const wheelGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.4, 16);
            const wheelMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
            const positions = [
                [0.7, 0.25, 0.6], [0.7, 0.25, -0.6],
                [-0.7, 0.25, 0.6], [-0.7, 0.25, -0.6]
            ];
            positions.forEach(p => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.rotation.x = Math.PI / 2;
                wheel.position.set(p[0], p[1], p[2]);
                carGroup.add(wheel);
            });

            carGroup.position.set(direction === 1 ? -12 : 12, 0, 0 - (laneIdx * 4));
            carGroup.userData = { speed: Math.random() * 0.1 + 0.1, direction: direction };
            
            scene.add(carGroup);
            cars.push(carGroup);
        }

        function jump() {
            if(!gameActive || isJumping) return;
            isJumping = true;
            playSound('jump');
            
            // Animation for jump (Bounce)
            const jumpDuration = 200;
            const startZ = chiikawa.position.z;
            const targetZ = startZ - 4;
            const startTime = performance.now();

            function updateJump(time) {
                const elapsed = time - startTime;
                const progress = Math.min(elapsed / jumpDuration, 1);
                
                // Parabola for Y
                chiikawa.position.y = 0.7 + Math.sin(progress * Math.PI) * 1.5;
                // Linear for Z
                chiikawa.position.z = startZ + (targetZ - startZ) * progress;

                if (progress < 1) {
                    requestAnimationFrame(updateJump);
                } else {
                    isJumping = false; // Finished jumping
                    if(chiikawa.position.z <= -16) {
                        score++;
                        document.getElementById('score').innerText = score;
                        playSound('match');
                        chiikawa.position.z = 4;
                    }
                }
            }
            requestAnimationFrame(updateJump);
        }

        function resetGame() {
            score = 0;
            isJumping = false;
            document.getElementById('score').innerText = score;
            chiikawa.position.set(0, 0.7, 4);
            gameActive = true;
            document.getElementById('msg').style.display = 'none';
            // Clear cars
            cars.forEach(car => scene.remove(car));
            cars = [];
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Background Car Spawning (Always running)
            if(Math.random() < 0.02) spawnCarBackground();

            // Move cars
            for(let i = cars.length - 1; i >= 0; i--) {
                const car = cars[i];
                car.position.x += car.userData.speed * car.userData.direction;

                // Collision & HUD only when active
                if(gameActive) {
                    const dist = car.position.distanceTo(chiikawa.position);
                    const threshold = 1.3; 
                    if(dist < threshold) {
                        playSound('crash');
                        gameActive = false;
                        document.getElementById('modal-title').innerText = "哎呀！被車撞到了... 🥺";
                        document.getElementById('msg').style.display = 'block';
                    }
                }

                // Remove if out of bounds
                if(Math.abs(car.position.x) > 25) {
                    scene.remove(car);
                    cars.splice(i, 1);
                }
            }

            if(gameActive) {
                // Camera follow
                camera.position.z = chiikawa.position.z + 6;
                camera.lookAt(chiikawa.position.x, 0, chiikawa.position.z);
            }

            renderer.render(scene, camera);
        }

        // Helper for background car spawning
        function spawnCarBackground() {
            const laneIdx = Math.floor(Math.random() * 4);
            const direction = laneIdx % 2 === 0 ? 1 : -1;
            const spawnZ = 0 - (laneIdx * 4);
            const spawnX = direction === 1 ? -12 : 12;
            const overlap = cars.some(car => car.position.z === spawnZ && Math.abs(car.position.x - spawnX) < 5);
            if(!overlap) spawnCar(laneIdx, direction);
        }

        // Add playSound from lab3 logic for consistency
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'jump') {
                osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
            } else if (type === 'crash') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now); osc.frequency.linearRampToValueAtTime(10, now + 0.3);
                gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
            } else if (type === 'match') {
                osc.frequency.setValueAtTime(500, now); osc.frequency.exponentialRampToValueAtTime(1000, now + 0.2);
                gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.2);
            }
            osc.start(now); osc.stop(now + 0.3);
        }

        init();
    </script>
</body>
</html>
